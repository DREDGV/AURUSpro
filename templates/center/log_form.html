{% extends "base.html" %}
{% block title %}Новое событие — AURUS{% endblock %}
{% block page_title %}Новое событие{% endblock %}
{% block content %}
<form method="POST" class="col-md-8">
    <div class="mb-3">
        <label class="form-label fw-semibold">Название *</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label fw-semibold">Тип</label>
            <select name="event_type" class="form-select">
                {% for t in ['Игрок', 'Военное', 'Дипломатия', 'Экономика', 'Решение', 'Проблема', 'Создание', 'Прочее'] %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Дата события</label>
            <input type="text" name="event_date" class="form-control" placeholder="дд.мм.гггг">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Связанный игрок</label>
            <input type="text" name="related_player" class="form-control" placeholder="Ник игрока">
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Описание</label>
        <textarea name="description" class="form-control" rows="4"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Автор</label>
        <input type="text" name="author" class="form-control" placeholder="Кто фиксирует">
    </div>
    <button type="submit" class="btn" style="background:var(--accent);color:#fff;">Добавить</button>
    <a href="{{ url_for('center.log') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
