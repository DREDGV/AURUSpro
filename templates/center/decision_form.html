{% extends "base.html" %}
{% block title %}Новое решение — AURUS{% endblock %}
{% block page_title %}Новое решение{% endblock %}
{% block content %}
<form method="POST" class="col-md-8">
    <div class="mb-3">
        <label class="form-label fw-semibold">Название *</label>
        <input type="text" name="title" class="form-control" required>
    </div>
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label fw-semibold">Предложил</label>
            <input type="text" name="proposer" class="form-control" placeholder="Кто предложил">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Статус</label>
            <select name="status" class="form-select">
                {% for s in ['Предложено', 'Согласовано', 'Выполнено', 'Отменено'] %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-semibold">Приоритет</label>
            <select name="priority" class="form-select">
                {% for p in ['Высокий', 'Средний', 'Низкий'] %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Описание</label>
        <textarea name="description" class="form-control" rows="4"></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label fw-semibold">Срок</label>
        <input type="text" name="deadline" class="form-control" placeholder="дд.мм.гггг">
    </div>
    <button type="submit" class="btn" style="background:var(--accent);color:#fff;">Создать</button>
    <a href="{{ url_for('center.decisions') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
